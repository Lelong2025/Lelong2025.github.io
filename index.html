<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="logo_dung_vi.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>Đăng nhập - Tra cứu thông tin tạp chí</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      --text-color: #1e293b;
      --text-muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(255, 255, 255, 0.6);
      --input-bg: rgba(255, 255, 255, 0.9);
      --input-border: #cbd5e1;
      --input-focus: #3b82f6;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --primary-hover: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --glow-color: rgba(99, 102, 241, 0.15);
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(30, 41, 59, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(15, 23, 42, 0.6);
      --input-border: #334155;
      --input-focus: #3b82f6;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --primary-hover: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --glow-color: rgba(59, 130, 246, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background decorative glowing blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      opacity: 0.6;
      animation: floatBlob 20s infinite alternate;
    }

    .blob-1 {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
    }

    .blob-2 {
      bottom: -10%;
      right: -10%;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
    }

    @keyframes floatBlob {
      0% {
        transform: translate(0, 0) scale(1);
      }
      100% {
        transform: translate(5%, 5%) scale(1.1);
      }
    }

    .theme-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-color);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      box-shadow: var(--shadow);
    }

    .theme-toggle:hover {
      transform: scale(1.08);
      background: rgba(128, 128, 128, 0.2);
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      z-index: 2;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-container img {
      height: 60px;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.15));
    }

    .login-header h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-color);
      border-radius: 12px;
      padding: 14px 16px 14px 44px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    .form-input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px var(--glow-color);
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .toggle-password:hover {
      color: var(--text-color);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      user-select: none;
    }

    .remember-me input {
      accent-color: #3b82f6;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      background: var(--primary-gradient);
      cursor: pointer;
      box-shadow: 0 8px 20px var(--glow-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px var(--glow-color);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Toast notification design */
    .toast-container {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      backdrop-filter: blur(10px);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), toastOut 0.3s forwards 3s;
      pointer-events: auto;
    }

    [data-theme="light"] .toast {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.05);
      color: #1e293b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .toast.error i {
      color: #ef4444;
    }

    .toast.success i {
      color: #10b981;
    }

    @keyframes toastIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes toastOut {
      to {
        transform: translateY(-20px);
        opacity: 0;
      }
    }

    /* Splash / Loading Overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-gradient);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--input-border);
      border-radius: 50%;
      border-top-color: #3b82f6;
      animation: spin 1s linear infinite;
    }
  </style>
</head>

<body>
  <!-- Splash/Loading Overlay to avoid content flash on automatic redirects -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loader"></div>
    <p style="font-weight: 500; font-size: 15px; color: var(--text-muted);">Đang tải...</p>
  </div>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <button class="theme-toggle" id="themeToggleBtn" title="Chuyển đổi giao diện Sáng/Tối">
    <i class="fas fa-moon"></i>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-container">
          <img src="LHU&ASU-ENG 2@.png" alt="Logo LHU">
        </div>
        <h2>Tra cứu thông tin tạp chí</h2>
        <p>Vui lòng đăng nhập tài khoản của bạn</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập / Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="username" class="form-input" placeholder="ten_tai_khoan@lhu.edu.vn" required autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
            <i class="fas fa-eye-slash toggle-password" id="togglePasswordBtn" onclick="togglePasswordVisibility()"></i>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            Ghi nhớ đăng nhập
          </label>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">
          <span class="spinner" id="btnSpinner"></span>
          <span>Đăng nhập</span>
        </button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // 1. Check if user is already logged in (Remember Me session)
    (function() {
      if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.replace('search.html');
      } else {
        // Remove loading overlay if not redirected
        window.addEventListener('DOMContentLoaded', () => {
          const overlay = document.getElementById('loadingOverlay');
          setTimeout(() => {
            overlay.classList.add('fade-out');
            setTimeout(() => overlay.remove(), 500);
          }, 400);
        });
      }
    })();

    // 2. Pre-fill username if remembered
    window.addEventListener('DOMContentLoaded', () => {
      const rememberedUser = localStorage.getItem('rememberedUsername');
      if (rememberedUser) {
        document.getElementById('username').value = rememberedUser;
        document.getElementById('rememberMe').checked = true;
      }
    });

    // 3. Theme Toggle Logic
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const htmlEl = document.documentElement;

    const savedTheme = localStorage.getItem('theme') || 'dark';
    htmlEl.setAttribute('data-theme', savedTheme);
    updateToggleIcon(savedTheme);

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = htmlEl.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateToggleIcon(newTheme);
    });

    function updateToggleIcon(theme) {
      if (theme === 'dark') {
        themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
      } else {
        themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
      }
    }

    // 4. Toggle Password Visibility
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('togglePasswordBtn');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.className = 'fas fa-eye toggle-password';
      } else {
        passwordInput.type = 'password';
        toggleIcon.className = 'fas fa-eye-slash toggle-password';
      }
    }

    // 5. Toast System
    function showToast(message, type = 'error') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' 
        ? '<i class="fas fa-check-circle"></i>' 
        : '<i class="fas fa-exclamation-circle"></i>';
        
      toast.innerHTML = `${icon}<span>${message}</span>`;
      container.appendChild(toast);
      
      // Auto-remove toast after animation completes
      setTimeout(() => {
        toast.remove();
      }, 3300);
    }

    // 6. SHA-256 Hashing Algorithm
    async function hashPassword(plainText) {
      const msgBuffer = new TextEncoder().encode(plainText);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 7. Handle Login Action
    async function handleLogin(event) {
      event.preventDefault();
      
      const emailInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      const rememberMeChecked = document.getElementById('rememberMe').checked;
      
      const submitBtn = document.getElementById('submitBtn');
      const spinner = document.getElementById('btnSpinner');
      
      // Disable button & show spinner
      submitBtn.disabled = true;
      spinner.style.display = 'block';

      // Minimum delay for better UI experience
      const startTime = Date.now();

      try {
        const inputHash = await hashPassword(passwordInput);
        const correctUsername = "phuonglong@lhu.edu.vn";
        // Pre-computed SHA-256 hash of "longdao021204"
        const correctPasswordHash = "d3463b7ca11edeedff352bb8b3038bebfb8c4855f171c4d0327ca7efbc67bb71";

        const elapsedTime = Date.now() - startTime;
        const remainingTime = Math.max(0, 800 - elapsedTime);
        await new Promise(resolve => setTimeout(resolve, remainingTime));

        if (emailInput.toLowerCase() === correctUsername && inputHash === correctPasswordHash) {
          showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');
          
          // Set Session Status
          if (rememberMeChecked) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('rememberedUsername', emailInput);
          } else {
            sessionStorage.setItem('isLoggedIn', 'true');
            // Clear remembered username if it was checked off
            localStorage.removeItem('rememberedUsername');
          }
          
          // Session storage fallback for search.html check
          sessionStorage.setItem('isLoggedIn', 'true');

          setTimeout(() => {
            window.location.replace('search.html');
          }, 1000);
        } else {
          showToast('Tên đăng nhập hoặc mật khẩu không đúng.', 'error');
          submitBtn.disabled = false;
          spinner.style.display = 'none';
        }
      } catch (err) {
        console.error(err);
        showToast('Có lỗi xảy ra trong quá trình xác thực.', 'error');
        submitBtn.disabled = false;
        spinner.style.display = 'none';
      }
    }
  </script>
</body>

</html>
