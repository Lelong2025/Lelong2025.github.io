<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Hệ thống bảo mật</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/src/magazine/login.css">
</head>

<body>

  <div class="login-container">
    <h1 id="authTitle">Đăng Nhập</h1>
    <p class="subtitle" id="authSubtitle">Truy cập hệ thống LHU Magazine</p>

    <!-- FORM ĐĂNG NHẬP -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="email" placeholder="Nhập email" autocomplete="email" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
        <i class="fas fa-eye-slash password-toggle" id="togglePassword"></i>
      </div>

      <div class="error" id="errorMsg">Thông tin không đúng!</div>
      <div class="locked" id="lockedMsg">Tài khoản bị khóa tạm thời. Thử lại sau 5 phút.</div>

      <button type="submit" class="btn">Đăng Nhập</button>

      <div class="toggle-auth">
        Chưa có tài khoản? <a id="linkToRegister">Đăng ký ngay</a>
      </div>
    </form>

    <!-- FORM ĐĂNG KÝ -->
    <form id="registerForm" style="display: none;">
      <div class="form-group">
        <label for="regName">Họ và tên</label>
        <i class="fas fa-user input-icon"></i>
        <input type="text" id="regName" placeholder="Nhập họ và tên" required>
      </div>

      <div class="form-group">
        <label for="regEmail">Email</label>
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="regEmail" placeholder="Nhập email" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="regPassword">Mật khẩu</label>
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="regPassword" placeholder="Nhập mật khẩu" autocomplete="new-password" required>
        <i class="fas fa-eye-slash password-toggle" id="toggleRegPassword"></i>
      </div>

      <div class="form-group">
        <label for="regConfirmPassword">Xác nhận mật khẩu</label>
        <i class="fas fa-check-double input-icon"></i>
        <input type="password" id="regConfirmPassword" placeholder="Nhập lại mật khẩu" autocomplete="new-password" required>
        <i class="fas fa-eye-slash password-toggle" id="toggleRegConfirmPassword"></i>
      </div>

      <div class="error" id="regErrorMsg"></div>
      <div class="success-msg" id="regSuccessMsg"></div>

      <button type="submit" class="btn">Đăng Ký</button>

      <div class="toggle-auth">
        Đã có tài khoản? <a id="linkToLogin">Đăng nhập</a>
      </div>
    </form>

    <div class="footer">
      © 2026 Hệ thống bảo mật - LHU Magazine
    </div>
  </div>
  <script type="module" src="/src/magazine/login.js"></script>
</body>

</html>
